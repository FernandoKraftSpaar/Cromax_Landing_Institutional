name: Deploy to GitHub Pages

on:
  push:
    # main = produção. feat/landing-home = preview temporário do PR #1
    # (remover a branch de feature quando o PR for mesclado).
    branches: [main, "feat/landing-home"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Uma publicação por vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (Vite — base=/Cromax_Landing_Institutional/)
        run: npm run build
        env:
          GITHUB_PAGES: "true"
      - name: Fallback de SPA (404.html = index.html)
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
